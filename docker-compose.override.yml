services:
  backend:
    build:
      target: development     # 開發時蓋掉
    environment:
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    develop:
      watch:
        # Sync source code changes instantly
        - path: ./app/src
          target: /app/src
          action: sync
        # Rebuild and restart the service if dependencies change
        - path: ./app/package.json
          action: rebuild